name: Update ETF geography data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 20 * *"

permissions:
  contents: write

concurrency:
  group: dashboard-data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-etf-geography:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update ETF geography JSON
        run: python scripts/update-etf-geography.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf-geography.json
          if git diff --cached --quiet; then
            echo "No geography changes to commit."
          else
            git commit -m "Update ETF geography data"
            git pull --rebase origin main
            git push
          fi
