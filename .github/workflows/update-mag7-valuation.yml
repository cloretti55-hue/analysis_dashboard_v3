name: Update Magnificent 7 valuation data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: dashboard-data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-mag7-valuation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade yfinance

      - name: Update Magnificent 7 valuation JSON
        run: python scripts/update-mag7-valuation.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mag7-valuation.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Magnificent 7 valuation data"
            git pull --rebase origin main
            git push
          fi
