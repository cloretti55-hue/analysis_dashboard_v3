<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arquitetura de Mercado | Yield Curves</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #071324;
        --surface: #0f2037;
        --surface-2: #142b48;
        --ink: #f3f8ff;
        --muted: #aab8ca;
        --line: rgba(222, 233, 247, 0.16);
        --nominal: #48d6e9;
        --real: #c49bff;
        --inflation: #ffae6b;
        --positive: #7ee6a5;
        --negative: #ff8b86;
        --focus: #48d6e9;
        --nominal-soft: rgba(72, 214, 233, 0.16);
        --real-soft: rgba(196, 155, 255, 0.16);
        --inflation-soft: rgba(255, 174, 107, 0.16);
        --focus-soft: rgba(72, 214, 233, 0.14);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.26);
      }

      body.theme-light {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --surface-2: #eef4fb;
        --ink: #102033;
        --muted: #607188;
        --line: rgba(32, 57, 84, 0.15);
        --nominal: #047a94;
        --real: #7357c8;
        --inflation: #b96a20;
        --positive: #167a49;
        --negative: #c74a44;
        --focus: #047a94;
        --nominal-soft: rgba(4, 122, 148, 0.11);
        --real-soft: rgba(115, 87, 200, 0.12);
        --inflation-soft: rgba(185, 106, 32, 0.12);
        --focus-soft: rgba(4, 122, 148, 0.1);
        --shadow: 0 16px 40px rgba(37, 58, 84, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(7, 19, 36, 0.96), rgba(6, 15, 29, 0.98)),
          radial-gradient(circle at top left, rgba(72, 214, 233, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255, 174, 107, 0.1), transparent 30%),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body.theme-light {
        background:
          linear-gradient(180deg, rgba(244, 247, 251, 0.96), rgba(237, 243, 250, 0.98)),
          radial-gradient(circle at top left, rgba(4, 122, 148, 0.1), transparent 34%),
          radial-gradient(circle at bottom right, rgba(185, 106, 32, 0.08), transparent 30%),
          var(--bg);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        padding: 22px 0 18px;
      }

      .view-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 0 0 12px;
      }

      .view-tab {
        min-height: 34px;
        border: 1px solid rgba(72, 214, 233, 0.42);
        border-radius: 8px;
        padding: 7px 12px;
        background: var(--nominal-soft);
        color: var(--focus);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .view-tab[aria-current="page"] {
        box-shadow: inset 0 -2px 0 var(--focus);
      }

      .country-subtabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .country-subtabs button {
        min-height: 34px;
        border: 1px solid rgba(72, 214, 233, 0.34);
        border-radius: 8px;
        padding: 7px 12px;
        background: rgba(72, 214, 233, 0.07);
        color: var(--muted);
        font-weight: 850;
      }

      .country-subtabs button[aria-pressed="true"] {
        background: var(--focus-soft);
        color: var(--ink);
        border-color: var(--focus);
        box-shadow: inset 0 -2px 0 var(--focus);
      }

      .etf-shell {
        display: grid;
        gap: 16px;
      }

      .home-layout {
        display: grid;
        gap: 18px;
      }

      .home-hero {
        padding: 24px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
      }

      .home-hero h2 {
        margin: 0;
        font-size: clamp(32px, 4vw, 58px);
        line-height: 0.98;
      }

      .home-hero p {
        margin: 10px 0 0;
        max-width: 780px;
        color: var(--muted);
        line-height: 1.55;
      }

      .home-stamp {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .home-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .home-card {
        min-height: 220px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
        text-align: left;
        display: grid;
        align-content: space-between;
        gap: 20px;
      }

      body.theme-light .home-card {
        background: rgba(10, 32, 55, 0.04);
      }

      .home-card:hover {
        border-color: var(--home-accent, var(--focus));
        box-shadow: inset 0 -3px 0 var(--home-accent, var(--focus));
      }

      .home-card span,
      .home-card small {
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .home-card h3 {
        margin: 0;
        font-size: 24px;
      }

      .home-card p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .home-notes {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .home-note {
        padding: 16px;
      }

      .home-note h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .home-note p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .themes-layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.45fr) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .themes-feed {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .theme-news-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
        text-align: left;
        display: grid;
        gap: 12px;
      }

      body.theme-light .theme-news-card {
        background: rgba(10, 32, 55, 0.04);
      }

      .theme-news-card[aria-pressed="true"] {
        border-color: var(--focus);
        box-shadow: inset 0 -3px 0 var(--focus);
      }

      .theme-news-card small {
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .theme-news-card h3 {
        margin: 0;
        font-size: 22px;
      }

      .theme-news-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .theme-news-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .theme-news-meta span {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .themes-preview {
        display: grid;
        gap: 16px;
      }

      .themes-preview-head {
        padding: 18px;
      }

      .themes-preview-head h2 {
        margin: 0;
        font-size: clamp(28px, 3vw, 46px);
        line-height: 1;
      }

      .theme-image-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }

      .theme-image-card {
        overflow: hidden;
        cursor: zoom-in;
        text-align: left;
      }

      .theme-image-card img {
        display: block;
        width: 100%;
        height: clamp(180px, 26vw, 320px);
        object-fit: contain;
        background: rgba(255, 255, 255, 0.92);
      }

      .theme-image-card.is-tall img {
        height: clamp(420px, 56vw, 760px);
        background: #07111d;
      }

      .theme-image-caption {
        padding: 14px 16px;
      }

      .theme-image-caption strong {
        display: block;
        color: var(--ink);
        font-size: 15px;
        margin-bottom: 6px;
      }

      .theme-image-caption p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.45;
      }

      .image-lightbox {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(1, 10, 20, 0.82);
        backdrop-filter: blur(10px);
      }

      .image-lightbox-inner {
        width: min(98vw, 1560px);
        max-height: 92vh;
        display: grid;
        gap: 12px;
      }

      .image-lightbox-stage {
        max-height: 82vh;
        overflow-x: hidden;
        overflow-y: auto;
        border-radius: 8px;
        background: #fff;
      }

      .image-lightbox img {
        width: 100%;
        height: auto;
        object-fit: initial;
        border-radius: 8px;
        background: #fff;
        transform-origin: top left;
        transition: width 0.18s ease;
      }

      .image-lightbox-caption {
        color: #f6fbff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .image-lightbox-caption strong {
        display: block;
        font-size: 16px;
      }

      .image-lightbox-caption span {
        color: rgba(246, 251, 255, 0.75);
        font-size: 13px;
      }

      .image-lightbox button {
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        padding: 8px 12px;
        font-weight: 850;
        cursor: pointer;
      }

      .image-lightbox button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .image-zoom-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .image-zoom-controls span {
        min-width: 46px;
        color: rgba(246, 251, 255, 0.82);
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      }

      .themes-preview-head p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      @media (max-width: 1180px) {
        .home-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .home-notes {
          grid-template-columns: 1fr;
        }

        .themes-layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .home-hero {
          grid-template-columns: 1fr;
        }

        .home-grid {
          grid-template-columns: 1fr;
        }

        .theme-image-gallery {
          grid-template-columns: 1fr;
        }

        .theme-image-card img {
          height: 220px;
        }

        .theme-image-card.is-tall img {
          height: 440px;
        }

        .image-lightbox {
          padding: 14px;
        }

        .image-lightbox-caption {
          align-items: flex-start;
          flex-direction: column;
        }
      }

      .etf-subtabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px;
      }

      .etf-subtabs button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      body.theme-light .etf-subtabs button {
        background: rgba(10, 32, 55, 0.04);
      }

      .etf-subtabs button[aria-pressed="true"] {
        border-color: var(--focus);
        background: var(--focus-soft);
        color: var(--focus);
        box-shadow: inset 0 -2px 0 var(--focus);
      }

      .theme-switch {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 260px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 32, 55, 0.72);
        box-shadow: var(--shadow);
      }

      body.theme-light .theme-switch {
        background: rgba(255, 255, 255, 0.86);
      }

      .theme-switch button {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 10px;
        background: var(--focus-soft);
        color: var(--focus);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      h1 {
        max-width: 980px;
        margin: 0;
        font-size: clamp(30px, 4.1vw, 58px);
        line-height: 1;
        letter-spacing: 0;
      }

      .lead {
        max-width: 920px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.55;
      }

      .market-stamp {
        display: grid;
        gap: 8px;
        min-width: 260px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 32, 55, 0.88);
        box-shadow: var(--shadow);
      }

      .header-side {
        display: grid;
        gap: 10px;
      }

      .market-stamp span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .market-stamp strong {
        font-size: 30px;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 32, 55, 0.88);
        box-shadow: var(--shadow);
      }

      body.theme-light .panel,
      body.theme-light .market-stamp {
        background: rgba(255, 255, 255, 0.88);
      }

      .data-lab-layout {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(380px, 1.05fr);
        gap: 18px;
        align-items: start;
      }

      .data-lab-list,
      .data-lab-metrics,
      .data-lab-active {
        padding: 18px;
      }

      .data-lab-list {
        display: grid;
        align-content: start;
        gap: 14px;
      }

      .data-lab-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .data-lab-filter {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      body.theme-light .data-lab-filter {
        background: rgba(10, 32, 55, 0.04);
      }

      .data-lab-filter[aria-pressed="true"] {
        border-color: var(--focus);
        background: var(--focus-soft);
        color: var(--ink);
      }

      .data-lab-instruments {
        display: grid;
        gap: 14px;
      }

      .data-lab-subgroup {
        display: grid;
        gap: 8px;
      }

      .data-lab-subgroup-title {
        color: var(--ink);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .data-lab-chip-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
      }

      .data-lab-chip {
        min-height: 78px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
        text-align: left;
      }

      body.theme-light .data-lab-chip {
        background: rgba(10, 32, 55, 0.04);
      }

      .data-lab-chip[data-subgroup-tone] {
        border-color: color-mix(in srgb, var(--subgroup-color, var(--focus)) 38%, var(--line));
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--subgroup-color, var(--focus)) 17%, transparent), transparent 72%),
          rgba(255, 255, 255, 0.04);
      }

      body.theme-light .data-lab-chip[data-subgroup-tone] {
        border-color: color-mix(in srgb, var(--subgroup-color, var(--focus)) 42%, var(--line));
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--subgroup-color, var(--focus)) 18%, transparent), transparent 72%),
          rgba(10, 32, 55, 0.035);
      }

      .data-lab-chip[aria-pressed="true"] {
        border-color: var(--focus);
        background: var(--focus-soft);
        box-shadow: inset 0 -2px 0 var(--focus);
      }

      .data-lab-chip strong {
        display: block;
        font-size: 18px;
        line-height: 1.1;
      }

      .data-lab-chip span {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
        text-transform: uppercase;
      }

      .data-lab-active {
        display: grid;
        gap: 18px;
        align-self: start;
      }

      .data-lab-active h2 {
        margin: 0;
        font-size: clamp(28px, 3vw, 48px);
        line-height: 1;
      }

      .data-lab-active p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .data-lab-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .data-lab-badges span {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
      }

      body.theme-light .data-lab-badges span {
        background: rgba(10, 32, 55, 0.05);
      }

      .data-lab-badges b {
        color: var(--ink);
        font-size: 12px;
      }

      .data-lab-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .data-lab-metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px;
        background: rgba(255, 255, 255, 0.04);
      }

      body.theme-light .data-lab-metric {
        background: rgba(10, 32, 55, 0.04);
      }

      .data-lab-metric span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .data-lab-metric strong {
        display: block;
        margin-top: 7px;
        font-size: 24px;
      }

      .data-lab-active-table {
        width: 100%;
        border-collapse: collapse;
      }

      .data-lab-active-table th,
      .data-lab-active-table td {
        border-bottom: 1px solid var(--line);
        padding: 10px 0;
        text-align: left;
      }

      .data-lab-active-table td:last-child,
      .data-lab-active-table th:last-child {
        text-align: right;
      }

      .data-lab-charts {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px;
      }

      .data-lab-chart {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.035);
      }

      body.theme-light .data-lab-chart {
        background: rgba(10, 32, 55, 0.04);
      }

      .data-lab-chart h3 {
        margin: 0 0 12px;
        font-size: 15px;
      }

      .data-lab-bars {
        display: grid;
        gap: 10px;
      }

      .data-lab-bar-row {
        display: grid;
        grid-template-columns: 82px minmax(0, 1fr) 62px;
        gap: 9px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .data-lab-track {
        position: relative;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      body.theme-light .data-lab-track {
        background: rgba(10, 32, 55, 0.1);
      }

      .data-lab-bar {
        position: absolute;
        inset: 0 auto 0 0;
        width: var(--w);
        border-radius: inherit;
        background: var(--tone, var(--focus));
      }

      .data-lab-bar.is-negative {
        right: 0;
        left: auto;
        background: var(--negative);
      }

      .data-lab-line-card {
        display: grid;
        gap: 12px;
      }

      .data-lab-chart-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .data-lab-legend,
      .data-lab-chart-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .data-lab-legend span,
      .data-lab-chart-summary span,
      .data-lab-chart-summary strong {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .data-lab-legend span::before {

    </script>
  </body>
