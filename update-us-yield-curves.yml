name: Update US yield curve data

on:
  workflow_dispatch:
  schedule:
    - cron: "45 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: dashboard-data-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-us-yield-curves:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update US yield curve JSON
        run: python scripts/update-us-yield-curves.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/curve-us.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update US yield curve data"
            git pull --rebase origin main
            git push
          fi
